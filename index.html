<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmFlip - Рандомайзер фильмов</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="logo">🎬 FilmFlip</h1>
            <p class="subtitle">Не знаешь что посмотреть? Доверься случаю!</p>
        </header>

        <!-- Filters Section -->
        <section class="filters" id="filtersSection">
            <div class="filter-group">
                <label for="genreSelect">Жанр</label>
                <select id="genreSelect">
                    <option value="">Любой жанр</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="decadeSelect">Десятилетие</label>
                <select id="decadeSelect">
                    <option value="">Любое десятилетие</option>
                    <option value="2020">2020-е</option>
                    <option value="2010">2010-е</option>
                    <option value="2000">2000-е</option>
                    <option value="1990">1990-е</option>
                    <option value="1980">1980-е</option>
                    <option value="1970">1970-е</option>
                    <option value="1960">1960-е</option>
                    <option value="1950">1950-е</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="ratingSlider">Мин. рейтинг: <span id="ratingValue">0</span></label>
                <input type="range" id="ratingSlider" min="0" max="10" step="0.5" value="0">
            </div>

            <div class="buttons-row">
                <button id="findMovieBtn" class="btn btn-primary btn-large">🎲 Найти фильм</button>
                <button id="luckyBtn" class="btn btn-secondary">⚡ Мне повезёт!</button>
            </div>
        </section>

        <!-- Loader -->
        <div id="loader" class="loader hidden">
            <div class="spinner"></div>
            <p>Ищем идеальный фильм...</p>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message hidden"></div>

        <!-- Movie Card -->
        <div id="movieCard" class="movie-card hidden">
            <div class="movie-poster">
                <img id="moviePoster" src="" alt="Постер фильма">
                <div class="movie-rating" id="movieRating"></div>
            </div>

            <div class="movie-info">
                <h2 class="movie-title" id="movieTitle"></h2>
                <p class="movie-original-title" id="movieOriginalTitle"></p>
                
                <div class="movie-meta">
                    <span class="movie-year" id="movieYear"></span>
                    <span class="movie-genres" id="movieGenres"></span>
                </div>

                <div class="movie-description">
                    <p id="movieOverview" class="overview-text"></p>
                    <button id="expandOverviewBtn" class="btn-expand">Читать полностью</button>
                </div>

                <div class="watch-providers" id="watchProviders">
                    <h3>Где смотреть:</h3>
                    <div class="providers-list" id="providersList"></div>
                </div>

                <div class="movie-actions">
                    <button id="trailerBtn" class="btn btn-trailer">▶️ Смотреть трейлер</button>
                    <button id="anotherMovieBtn" class="btn btn-secondary">🔄 Другой фильм</button>
                    <button id="shareBtn" class="btn btn-share">📤 Поделиться</button>
                </div>
            </div>
        </div>

        <!-- Share Toast -->
        <div id="shareToast" class="toast hidden">
            Текст скопирован в буфер обмена!
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Data provided by <a href="https://www.themoviedb.org/" target="_blank">TMDb</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
